version: 1
intake:
  - web_form
  - email
  - github_issue
rules:
  max_complexity: simple
  allowed_categories:
    - bug_report
    - copy_change
    - ui_tweak
  branch_prefix: "mosaic/"
  reviewers:
    - "repo-owner-username"
llm:
  mode: byok
security:
  max_files_changed: 5
  max_lines_added: 350
  max_changed_lines: 500
  block_patterns:
    - "eval("
    - "child_process"
